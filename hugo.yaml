baseURL: "https://wisexplore.github.io/"
title: "WiseXplore"
theme: "PaperMod"
languageCode: "zh-cn"
defaultContentLanguage: "zh"

enableRobotsTXT: true
enableEmoji: true
hasCJKLanguage: true

taxonomies: {}

disableKinds:
  - taxonomy
  - term

pagination:
  pagerSize: 10

params:
  env: production
  title: "WiseXplore"
  description: "我的小天地。"
  author: "wisexplore"

  assets:
    css:
      - "css/extended/toc-left.css"
  
  defaultTheme: auto
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: true

  homeInfoParams:
    Title: "WiseXplore"
    Content: "我的小天地。"

  mainSections:
    - posts
    - ai-records
    - leetcode
    - engineering-notes

  socialIcons:
    - name: github
      url: "https://github.com/wisexplore"

menu:
  main:
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 10
    - identifier: ai-records
      name: AI记录
      url: /ai-records/
      weight: 20
    - identifier: leetcode
      name: LeetCode
      url: /leetcode/
      weight: 30
    - identifier: engineering-notes
      name: 工程杂记
      url: /engineering-notes/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
